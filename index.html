<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixiv 随机图片</title>
    <!-- 标签页图标 -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <!-- 移动端浏览器状态栏主题 -->
    <meta name="theme-color" content="#1a1a1a">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #1a1a1a;
            color: #bbb;
            font-family: "Microsoft Yahei", sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .query-wrap {
            display: flex;
            gap: 8px;
            width: 100%;
            max-width: 600px;
        }
        #queryInput {
            flex: 1;
            padding: 8px 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 4px;
            color: #eee;
            outline: none;
        }
        #queryInput:focus {
            border-color: #ff69b4;
        }
        button {
            padding: 8px 16px;
            background: #333;
            border: 1px solid #444;
            border-radius: 4px;
            color: #eee;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover:not(:disabled) {
            background: #444;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-group {
            display: flex;
            gap: 12px;
        }
        #getSpecial {
            color: #ff69b4;
            border-color: #ff69b4;
        }
        #queryStatus {
            font-size: 14px;
            min-height: 20px;
        }
        /* 图片区域外层包裹 */
        #imgWrap {
            width: 100%;
            max-width: 900px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #imgBox {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            min-height: 300px;
            max-height: min(70vh, 800px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #222;
            border-radius: 8px;
            overflow: hidden;
            transition: width 0.2s ease, height 0.2s ease;
        }
        #randomImg {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            cursor: zoom-in;
        }
        #loadingTip {
            position: absolute;
            top: 12px;
            right: 12px;
            color: #fff;
            font-size: 14px;
            display: none;
            padding: 4px 10px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 4px;
            z-index: 10;
        }
        .page-control {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        #prevBtn, #nextBtn {
            min-width: 60px;
            display: none;
        }
        #pageIndicator {
            display: none;
            font-size: 14px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s ease;
        }
        #pageIndicator:hover {
            background: #333;
        }
        .btn-disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .info-panel {
            width: 100%;
            max-width: 900px;
            background: #222;
            border-radius: 8px;
            padding: 16px;
            margin-top: 8px;
        }
        .info-panel h3 {
            margin-bottom: 12px;
            color: #eee;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
        }
        .info-row {
            display: flex;
            margin-bottom: 8px;
            font-size: 14px;
            line-height: 1.5;
        }
        .info-label {
            width: 100px;
            flex-shrink: 0;
            color: #888;
        }
        .tag-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            flex: 1;
        }
        .tag-item {
            padding: 2px 8px;
            background: #333;
            border-radius: 12px;
            font-size: 12px;
            color: #ddd;
        }
        #mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }
        #fullImg {
            max-width: 95vw;
            max-height: 95vh;
            width: auto;
            height: auto;
            object-fit: contain;
        }
        /* 移动端兼容 */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            .query-wrap {
                flex-direction: column;
            }
            #loadingTip {
                top: 8px;
                right: 8px;
                font-size: 12px;
            }
            /* 外层包裹固定布局 */
            #imgWrap {
                height: 60vh;
                max-width: 100% !important;
            }
            /* 内层 imgBox 贴合图片 */
            #imgBox {
                width: auto !important;
                height: auto !important;
                aspect-ratio: unset !important;
                max-width: 100% !important;
                min-height: auto !important;
                max-height: 100% !important;
            }
            /* 图片按原始比例显示 */
            #randomImg {
                width: auto !important;
                height: auto !important;
                max-width: 100% !important;
                max-height: 60vh !important;
            }
            /* 移动端隐藏上下页按钮 */
            #prevBtn, #nextBtn {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <!-- 看什么看喵！ -->
    <script src="domBuilder.js"></script>
    <script src="proxyConfig.js"></script>
    <script src="infoPanel.js"></script>
    <script src="main.js"></script>
    <script src="queryImage.js"></script>
    <script src="siteProtect.js"></script>
</body>
</html>
