<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机图片</title>
    <!-- 网站图标 favicon -->
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="./favicon.ico" sizes="128x128">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a1a;
            min-height: 100vh;
            padding: 20px;
            font-family: sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        h2 {
            color: #fff;
            margin-bottom: 20px;
            font-weight: normal;
        }
        .btn-group {
            margin-top: 20px;
            margin-bottom: 15px;
        }
        button {
            padding: 12px 28px;
            margin: 0 8px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-normal {
            background: #409eff;
            color: #fff;
        }
        .btn-special {
            background: #f56c6c;
            color: #fff;
        }
        button:active {
            transform: scale(0.95);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .img-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #2d2d2d;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16 / 9;
            min-width: 300px;
            max-width: 100%;
            transition: aspect-ratio 0.3s ease;
        }
        .img-box.loaded {
            aspect-ratio: unset;
        }
        .loading-tip {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 10;
        }
        #randomImg {
            max-width: 100%;
            max-height: 65vh;
            display: block;
            image-rendering: auto;
            decoding: async;
            cursor: zoom-in;
            -webkit-touch-callout: default;
            user-select: auto;
            transition: opacity 0.2s ease;
        }
        .tip {
            color: #ccc;
            margin-top: 10px;
            font-size: 14px;
        }
        .query-panel {
            background: #2d2d2d;
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
            text-align: left;
        }
        .query-panel h3 {
            color: #fff;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #444;
            font-weight: bold;
        }
        .query-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .query-input {
            flex: 1;
            min-width: 240px;
            background: #1f1f1f;
            color: #fff;
            border: 1px solid #4a4a4a;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 15px;
            outline: none;
        }
        .query-input:focus {
            border-color: #409eff;
        }
        .query-btn {
            background: #67c23a;
            color: #fff;
            margin: 0;
        }
        .query-status {
            color: #bbb;
            margin-top: 10px;
            font-size: 13px;
            min-height: 20px;
        }

        /* 作品信息面板样式 */
        .info-panel {
            background: #2d2d2d;
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
            color: #eee;
            text-align: left;
            display: none;
        }
        .info-panel h3 {
            color: #fff;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #444;
        }
        .info-row {
            margin: 8px 0;
            line-height: 1.6;
        }
        .info-label {
            color: #999;
            display: inline-block;
            min-width: 110px;
        }
        .tag-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 4px;
        }
        .tag-item {
            background: #3a3a3a;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 13px;
            color: #ddd;
        }

        /* 全屏遮罩样式 */
        .full-mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.93);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 12px;
            cursor: zoom-out;
        }
        .full-img {
            max-width: calc(100vw - 24px);
            max-height: calc(100vh - 24px);
            width: auto;
            height: auto;
            object-fit: contain;
            -webkit-touch-callout: default;
            user-select: auto;
        }

        /* 左右箭头 */
        .prev-btn, .next-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 60px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: none;
            font-size: 28px;
            line-height: 60px;
            text-align: center;
            cursor: pointer;
            z-index: 5;
            transition: background 0.2s;
            display: none;
            padding: 0;
        }
        .prev-btn:active, .next-btn:active {
            transform: translateY(-50%) scale(0.95);
        }
        .prev-btn {
            left: 0;
            border-radius: 0 4px 4px 0;
        }
        .next-btn {
            right: 0;
            border-radius: 4px 0 0 4px;
        }
        .prev-btn:hover, .next-btn:hover {
            background: rgba(0,0,0,0.7);
        }
        .prev-btn:disabled, .next-btn:disabled,
        .next-btn.btn-disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* 页码指示器 */
        .page-indicator {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 5;
            display: none;
        }

        /* 手机端隐藏左右箭头 */
        @media (max-width: 767px) {
            .prev-btn, .next-btn {
                display: none !important;
            }
        }

        /* 电脑端显示箭头 */
        @media (min-width: 768px) {
            .prev-btn, .next-btn {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>随机图片</h2>
        <div class="img-box" id="imgBox">
            <div class="loading-tip" id="loadingTip">加载中喵</div>
            <button class="prev-btn" id="prevBtn" disabled>‹</button>
            <button class="next-btn" id="nextBtn">›</button>
            <div class="page-indicator" id="pageIndicator"></div>
            <img id="randomImg" src="" alt="随机图片" loading="eager" draggable="true">
        </div>
        <div class="btn-group">
            <button class="btn-normal" id="getNormal">全年龄</button>
            <button class="btn-special" id="getSpecial">R18</button>
        </div>
        <p class="tip">长按图片保存|双击图片全屏|多图右滑切图</p>
        <div class="query-panel">
            <h3>查询图片</h3>
            <div class="query-row">
                <input
                    class="query-input"
                    id="queryInput"
                    type="text"
                    placeholder="输入Pixiv ID 或作品链接"
                >
                <button class="query-btn" id="queryBtn">查询</button>
            </div>
            <div class="query-status" id="queryStatus"></div>
        </div>
        <!-- 作品信息面板挂载点 -->
        <div id="infoPanelMount"></div>
    </div>

    <!-- 全屏弹窗容器 -->
    <div class="full-mask" id="mask">
        <img class="full-img" id="fullImg" alt="全屏大图" draggable="true">
    </div>

    <!-- 加载配置文件 -->
    <script src="./proxyConfig.js"></script>
    <!-- 看什么看喵！！ -->
    <script src="./siteProtect.js"></script>
    <!-- 作品信息面板模块 -->
    <script src="./infoPanel.js"></script>
    <!-- 图片模块 -->
    <script src="./queryImage.js"></script>
    <!-- 主业务 -->
    <script src="./main.js"></script>
</body>
</html>
